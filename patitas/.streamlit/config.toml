# Tema visual de la aplicacion Patitas.
# Los colores siguen la identidad de marca: verde pino, ambar miel y
# coral, sobre un fondo color papel.

[theme]
primaryColor = "#1F6F54"
backgroundColor = "#FBF8F1"
secondaryBackgroundColor = "#F2EAD9"
textColor = "#2A2722"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
